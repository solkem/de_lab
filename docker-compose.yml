services:
  postgres:
    image: postgres:16
    container_name: lakeforge-postgres
    environment:
      POSTGRES_DB: lakeforge
      POSTGRES_USER: lakeforge
      POSTGRES_PASSWORD: lakeforge
    ports:
      - "5432:5432"
    volumes:
      - ./postgres-data:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    container_name: lakeforge-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ./minio:/data

  createbuckets:
    image: minio/mc:latest
    container_name: lakeforge-minio-init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until (/usr/bin/mc alias set local http://minio:9000 minioadmin minioadmin) do echo 'waiting for minio...' && sleep 2; done;
      /usr/bin/mc mb --ignore-existing local/lakeforge;
      /usr/bin/mc mb --ignore-existing local/lakeforge/raw;
      /usr/bin/mc mb --ignore-existing local/lakeforge/managed;
      /usr/bin/mc mb --ignore-existing local/lakeforge/checkpoints;
      /usr/bin/mc mb --ignore-existing local/lakeforge/volumes;
      exit 0;
      "

  spark-master:
    image: bitnami/spark:3.5
    container_name: lakeforge-spark-master
    environment:
      SPARK_MODE: master
      SPARK_RPC_AUTHENTICATION_ENABLED: "no"
      SPARK_RPC_ENCRYPTION_ENABLED: "no"
      SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED: "no"
      SPARK_SSL_ENABLED: "no"
    ports:
      - "7077:7077"
      - "8080:8080"

  spark-worker:
    image: bitnami/spark:3.5
    container_name: lakeforge-spark-worker
    depends_on:
      - spark-master
    environment:
      SPARK_MODE: worker
      SPARK_MASTER_URL: spark://spark-master:7077
      SPARK_WORKER_MEMORY: 2G
      SPARK_WORKER_CORES: 2
      SPARK_RPC_AUTHENTICATION_ENABLED: "no"
      SPARK_RPC_ENCRYPTION_ENABLED: "no"
      SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED: "no"
      SPARK_SSL_ENABLED: "no"
